<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful | XYZ STORE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #fdfdfd;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .success-card {
            background: white;
            padding: 4rem;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
            animation: slideUp 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .checkmark {
            font-size: 5rem;
            color: #064e3b;
            margin-bottom: 2rem;
            display: block;
        }
        h1 {
            font-family: 'Playfair Display';
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 3rem;
        }
        .btn-home {
            display: inline-block;
            text-decoration: none;
            background: #000;
            color: #fff;
            padding: 1.2rem 3rem;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            transition: 0.3s;
        }
        .btn-home:hover {
            background: #333;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="success-card">
        <span class="checkmark">✓</span>
        <h1>Order Successful</h1>
        <p>Your premium selection has been confirmed. Thank you for shopping with XYZ Store.</p>
        <a href="index.html" class="btn-home">Back to Store</a>
    </div>
</body>
</html>
